name: Checkov
description: 'Run checkov to check for terraform vulnerabilities'

inputs:
  entrypoint:
    description: 'The entry point for the Terraform code'
    default: '.'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: ${{ github.ref }}

    - name: Test Terraform with Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: ${{ inputs.entrypoint }}
        framework: terraform
