name: Terraform Lint and Validate
description: 'Run terraform validate, fmt, tflint and checkov on the given entry point'

inputs:
  terraform_version:
    description: 'The version of Terraform to use'
    default: 'latest'
    required: false
  tflint_version:
    description: 'The version of tflint to use'
    default: 'latest'
    required: false
  entrypoint:
    description: 'The entry point for the Terraform code'
    default: '.'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: ${{ github.ref }}

    - name: Check for terraform version mismatch
      shell: bash
      run: |
        if [ -f .terraform-version ]; then
          TF_VERSION=$(cat .terraform-version)
          if [ "$TF_VERSION" != "${{ inputs.terraform_version }}" ]; then
            echo -e "\033[1;31mError: terraform version in .terraform-version file does not match the given version."
            exit 1
          fi
        fi
      working-directory: ${{ inputs.entrypoint }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Remove azure backend
      shell: bash
      run: |
        if [ -f ./backend.tf ]; then
          rm ./backend.tf
        fi
      working-directory: ${{ inputs.entrypoint }}

    - name: Run a Terraform init
      shell: bash
      run: terraform init
      working-directory: ${{ inputs.entrypoint }}

    - name: Run a Terraform validate
      shell: bash
      run: terraform validate
      working-directory: ${{ inputs.entrypoint }}

    - name: Run a Terraform format check
      shell: bash
      run: terraform fmt -check=true -diff=true
      working-directory: ${{ inputs.entrypoint }}

    - name: Install terraform-docs
      shell: bash
      run: |
        curl -Lo /tmp/terraform-docs.tar.gz \
          https://github.com/terraform-docs/terraform-docs/releases/download/v0.23.0/terraform-docs-v0.23.0-Linux-amd64.tar.gz
        tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin terraform-docs
        terraform-docs --version

    - name: Generate Terraform documentation
      shell: bash
      run: terraform-docs --config .terraform-docs.yml --output-file README.md .
      working-directory: ${{ inputs.entrypoint }}

    - name: Fail if documentation is out of date
      shell: bash
      run: |
        if ! git diff --exit-code README.md; then
          echo "Documentation is out of date. Run 'terraform-docs --config .terraform-docs.yml --output-file README.md .' and commit the result."
          exit 1
        fi
      working-directory: ${{ inputs.entrypoint }}

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: ${{ inputs.tflint_version }}

    - name: Run TFLint
      shell: bash
      run: tflint -f compact
      working-directory: ${{ inputs.entrypoint }}
